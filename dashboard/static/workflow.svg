  <text x="250" y="892" text-anchor="middle" font-size="11" fill="#8892a4">staging / prod deploy</text>
  <line x1="320" y1="880" x2="658" y2="880" stroke="#8892a4" stroke-width="1.5" marker-end="url(#arrow)"/>
