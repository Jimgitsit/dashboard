  <text x="580" y="785" text-anchor="middle" font-size="10" fill="#8892a4">validates, merges PR</text>
  <text x="580" y="798" text-anchor="middle" font-size="10" fill="#8892a4">closes card</text>
  <line x1="520" y1="776" x2="492" y2="776" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="350" y="750" width="140" height="52" rx="8" fill="#22263a" stroke="#4ade80" stroke-width="1"/>
  <text x="420" y="770" text-anchor="middle" font-size="11" font-weight="600" fill="#4ade80">Card → Done</text>
