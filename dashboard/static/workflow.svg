  <rect x="350" y="858" width="140" height="44" rx="8" fill="#22263a" stroke="#2d3250" stroke-width="1"/>
  <text x="420" y="877" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0">Deploy URL</text>
  <text x="420" y="892" text-anchor="middle" font-size="10" fill="#8892a4">posted on card</text>
  <line x1="350" y1="900" x2="152" y2="940" stroke="#8892a4" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="30" y="940" width="120" height="44" rx="8" fill="#22263a" stroke="#fbbf24" stroke-width="1"/>
  <text x="90" y="959" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">Prod sign-off</text>
  <text x="90" y="974" text-anchor="middle" font-size="10" fill="#8892a4">(optional)</text>
  <rect x="520" y="870" width="390" height="90" rx="6" fill="#22263a" stroke="#2d3250"/>
  <text x="540" y="890" font-size="10" font-weight="600" fill="#8892a4">LEGEND</text>
