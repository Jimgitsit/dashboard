  <line x1="420" y1="710" x2="250" y2="710" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="250" y1="710" x2="250" y2="740" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="250" y1="740" x2="658" y2="740" stroke="#8892a4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="736" text-anchor="middle" font-size="9" fill="#fbbf24">spawn</text>
