  <text x="578" y="906" font-size="10" fill="#8892a4">agent action / data flow</text>
  <line x1="540" y1="918" x2="570" y2="918" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>
  <text x="578" y="922" font-size="10" fill="#8892a4">PM spawns agent</text>
