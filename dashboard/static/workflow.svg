  <text x="420" y="558" text-anchor="middle" font-size="10" fill="#fbbf24">PM poll detects</text>
  <line x1="420" y1="562" x2="420" y2="590" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="420" y1="590" x2="250" y2="590" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="250" y1="590" x2="250" y2="620" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="250" y1="620" x2="658" y2="620" stroke="#8892a4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="616" text-anchor="middle" font-size="9" fill="#fbbf24">spawn</text>
