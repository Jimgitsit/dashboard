  <text x="578" y="938" font-size="10" fill="#8892a4">human green-light / success</text>
  <line x1="540" y1="950" x2="570" y2="950" stroke="#f87171" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="578" y="954" font-size="10" fill="#8892a4">failure / rework loop</text>
