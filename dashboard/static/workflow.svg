  <text x="580" y="678" text-anchor="middle" font-size="10" fill="#8892a4">approves or requests Δ</text>
  <line x1="520" y1="660" x2="492" y2="660" stroke="#8892a4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="506" y="654" text-anchor="middle" font-size="9" fill="#8892a4">outcome</text>
  <rect x="350" y="630" width="140" height="52" rx="8" fill="#22263a" stroke="#2d3250" stroke-width="1"/>
  <text x="420" y="650" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e8f0">Review outcome</text>
