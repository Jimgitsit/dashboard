  <text x="420" y="798" text-anchor="middle" font-size="10" fill="#8892a4">task complete</text>
  <line x1="640" y1="802" x2="670" y2="802" stroke="#f87171" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="670" y1="802" x2="670" y2="536" stroke="#f87171" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="670" y1="536" x2="642" y2="536" stroke="#f87171" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="690" y="680" font-size="9" fill="#f87171">tests</text>
  <text x="690" y="692" font-size="9" fill="#f87171">failed</text>
