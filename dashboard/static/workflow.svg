  <text x="90" y="186" text-anchor="middle" font-size="11" fill="#8892a4">design doc</text>
  <line x1="150" y1="174" x2="178" y2="174" stroke="#8892a4" stroke-width="1.5" marker-end="url(#arrow)"/>
