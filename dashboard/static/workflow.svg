<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" width="100%" style="max-width:960px;display:block;" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
