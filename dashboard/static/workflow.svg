  <text x="250" y="452" text-anchor="middle" font-size="10" fill="#8892a4">+ comments</text>
  <line x1="320" y1="431" x2="348" y2="431" stroke="#8892a4" stroke-width="1.5" marker-end="url(#arrow)"/>
