  <line x1="420" y1="365" x2="250" y2="365" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="250" y1="365" x2="250" y2="392" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>
